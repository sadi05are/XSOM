<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XsomKG | Админ панель</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;--border:#1e2d45;
    --accent:#00d4aa;--accent2:#0096ff;--danger:#ff4757;--warn:#ffa502;
    --success:#2ed573;--text:#e8f0fe;--muted:#5a7290;
    --font:'Exo 2',sans-serif;--mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(0,212,170,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(0,150,255,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}

  #login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg);}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 40px 80px rgba(0,0,0,0.5);position:relative;overflow:hidden;}
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .login-logo{text-align:center;margin-bottom:32px;}
  .logo-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,212,170,0.3);}
  .login-logo h1{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;}
  .login-logo p{color:var(--muted);font-size:13px;margin-top:4px;}
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
  .form-group input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none;transition:border-color 0.2s;}
  .form-group input:focus{border-color:var(--accent);}
  .btn-login{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;padding:14px;color:#000;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:1px;transition:opacity 0.2s;}
  .btn-login:hover{opacity:0.9;}
  .login-error{color:var(--danger);font-size:13px;text-align:center;margin-top:12px;display:none;}

  #app{display:none;position:relative;z-index:1;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .header-left{display:flex;align-items:center;gap:12px;}
  .header-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .header-title{font-size:18px;font-weight:900;letter-spacing:1px;}
  .header-title span{color:var(--accent);}
  .header-right{display:flex;align-items:center;gap:16px;}
  .live-badge{display:flex;align-items:center;gap:6px;background:rgba(46,213,115,0.1);border:1px solid rgba(46,213,115,0.2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--success);}
  .live-dot{width:6px;height:6px;background:var(--success);border-radius:50%;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
  .btn-logout{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-family:var(--font);font-size:13px;cursor:pointer;transition:all 0.2s;}
  .btn-logout:hover{border-color:var(--danger);color:var(--danger);}

  .stats-bar{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
  .stat-item{flex:1;background:var(--surface);padding:14px 20px;display:flex;align-items:center;gap:10px;}
  .stat-icon{font-size:20px;}
  .stat-val{font-size:20px;font-weight:700;font-family:var(--mono);}
  .stat-val.green{color:var(--success);}.stat-val.blue{color:var(--accent2);}.stat-val.orange{color:var(--warn);}.stat-val.red{color:var(--danger);}
  .stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}

  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;}
  .tab{padding:14px 24px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
  .tab:hover{color:var(--text);}.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-badge{background:var(--accent);color:#000;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;min-width:18px;text-align:center;}
  .tab-badge.danger{background:var(--danger);color:#fff;}

  .content{padding:24px;max-width:1200px;margin:0 auto;}
  .tab-panel{display:none;}.tab-panel.active{display:block;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state .empty-icon{font-size:48px;margin-bottom:12px;}
  .empty-state p{font-size:15px;}

  .request-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:16px;overflow:hidden;transition:border-color 0.2s;animation:slideIn 0.3s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .request-card:hover{border-color:rgba(0,212,170,0.3);}
  .card-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface2);}
  .card-header-left{display:flex;align-items:center;gap:10px;}
  .card-type-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
  .badge-deposit{background:rgba(0,212,170,0.15);color:var(--accent);border:1px solid rgba(0,212,170,0.3);}
  .badge-withdrawal{background:rgba(0,150,255,0.15);color:var(--accent2);border:1px solid rgba(0,150,255,0.3);}
  .card-id{font-family:var(--mono);font-size:12px;color:var(--muted);}
  .card-time{font-size:12px;color:var(--muted);}
  .card-body{padding:20px;}
  .card-fields{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:16px;}
  .field-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
  .field-val{font-size:14px;font-weight:600;font-family:var(--mono);}
  .field-val.amount{color:var(--accent);font-size:18px;}
  .receipt-photo{width:100%;max-width:300px;border-radius:10px;cursor:pointer;border:1px solid var(--border);transition:transform 0.2s;margin-bottom:16px;display:block;}
  .receipt-photo:hover{transform:scale(1.02);}
  .card-actions{display:flex;gap:10px;flex-wrap:wrap;}
  .btn{border:none;border-radius:10px;padding:10px 20px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
  .btn:active{transform:scale(0.97);}.btn:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-approve{background:rgba(46,213,115,0.15);color:var(--success);border:1px solid rgba(46,213,115,0.3);}
  .btn-approve:hover:not(:disabled){background:rgba(46,213,115,0.25);}
  .btn-reject{background:rgba(255,71,87,0.15);color:var(--danger);border:1px solid rgba(255,71,87,0.3);}
  .btn-reject:hover:not(:disabled){background:rgba(255,71,87,0.25);}
  .btn-block{background:rgba(255,165,2,0.15);color:var(--warn);border:1px solid rgba(255,165,2,0.3);}
  .btn-block:hover:not(:disabled){background:rgba(255,165,2,0.25);}
  .btn-unblock{background:rgba(0,150,255,0.15);color:var(--accent2);border:1px solid rgba(0,150,255,0.3);}
  .btn-unblock:hover{background:rgba(0,150,255,0.25);}
  .status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
  .status-approved{background:rgba(46,213,115,0.15);color:var(--success);}
  .status-rejected{background:rgba(255,71,87,0.15);color:var(--danger);}

  .blocked-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .blocked-info{display:flex;align-items:center;gap:12px;}
  .blocked-avatar{width:40px;height:40px;border-radius:10px;background:rgba(255,165,2,0.15);border:1px solid rgba(255,165,2,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;}
  .blocked-name{font-weight:600;font-size:14px;}
  .blocked-id{font-family:var(--mono);font-size:12px;color:var(--muted);}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:1000;transform:translateY(80px);opacity:0;transition:all 0.3s;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.success{border-color:rgba(46,213,115,0.4);color:var(--success);}
  .toast.error{border-color:rgba(255,71,87,0.4);color:var(--danger);}

  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:999;cursor:pointer;}
  .lightbox.open{display:flex;}
  .lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

  @media(max-width:600px){
    .stats-bar{flex-wrap:wrap;}.stat-item{min-width:50%;}
    .card-fields{grid-template-columns:1fr 1fr;}
    .tabs{overflow-x:auto;}
    .login-box{padding:32px 24px;margin:16px;}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">⚡</div>
      <h1>XSOM KG</h1>
      <p>Панель администратора</p>
    </div>
    <div class="form-group"><label>ID администратора</label><input type="text" id="login-id" placeholder="Введите ID" autocomplete="off"></div>
    <div class="form-group"><label>Пароль</label><input type="password" id="login-pass" placeholder="Введите пароль"></div>
    <button class="btn-login" onclick="doLogin()">ВОЙТИ</button>
    <div class="login-error" id="login-error">❌ Неверный ID или пароль</div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">⚡</div>
      <div class="header-title">XSOM <span>KG</span></div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div> LIVE</div>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-icon">📥</div><div><div class="stat-val green" id="stat-deposit">0</div><div class="stat-label">Пополнений</div></div></div>
    <div class="stat-item"><div class="stat-icon">📤</div><div><div class="stat-val blue" id="stat-withdrawal">0</div><div class="stat-label">Выводов</div></div></div>
    <div class="stat-item"><div class="stat-icon">⏳</div><div><div class="stat-val orange" id="stat-pending">0</div><div class="stat-label">Ожидают</div></div></div>
    <div class="stat-item"><div class="stat-icon">🚫</div><div><div class="stat-val red" id="stat-blocked">0</div><div class="stat-label">Заблокировано</div></div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('deposit')" id="tab-deposit">📥 Пополнение <span class="tab-badge" id="badge-deposit">0</span></div>
    <div class="tab" onclick="switchTab('withdrawal')" id="tab-withdrawal">📤 Вывод <span class="tab-badge" id="badge-withdrawal">0</span></div>
    <div class="tab" onclick="switchTab('blocked')" id="tab-blocked">🚫 Заблокированные <span class="tab-badge danger" id="badge-blocked">0</span></div>
  </div>

  <div class="content">
    <div class="tab-panel active" id="panel-deposit"><div id="deposit-list"></div></div>
    <div class="tab-panel" id="panel-withdrawal"><div id="withdrawal-list"></div></div>
    <div class="tab-panel" id="panel-blocked"><div id="blocked-list"></div></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt="Чек"></div>
<div class="toast" id="toast"></div>

<script>
const ADMIN_ID = '20110510';
const ADMIN_PASS = 'sydykow75';
const BIN_ID = '69c811585fdde574550b329a';
const BIN_KEY = '$2a$10$mKjpEH2VfuAAprcI6itLLevuVv1.PyilbivryoPx9fRLmjd5iVkSy';
const TG_TOKEN = '8773815632:AAECXmBemUIPZ9womDXDQrk2UlcyGeyzYBQ';

let requests = {};
let blocked = {};

// ── LOGIN ──
function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  if (id === ADMIN_ID && pass === ADMIN_PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
    setInterval(loadData, 5000);
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
function logout() { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('app').style.display = 'none'; }

// ── JSONBIN ──
async function loadData() {
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      headers: { 'X-Master-Key': BIN_KEY }
    });
    const data = await res.json();
    const record = data.record || {};
    requests = record.requests || {};
    blocked = record.blocked || {};
    render();
  } catch (e) { console.error('Load error:', e); }
}

async function saveData() {
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: { 'X-Master-Key': BIN_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests, blocked, counter: Object.keys(requests).length + 1 })
    });
  } catch (e) { console.error('Save error:', e); }
}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── RENDER ──
function render() {
  const reqs = Object.values(requests);
  const deposits = reqs.filter(r => r.type === 'deposit');
  const withdrawals = reqs.filter(r => r.type === 'withdrawal');
  const pending = reqs.filter(r => r.status === 'pending');
  const blockedList = Object.values(blocked);

  document.getElementById('stat-deposit').textContent = deposits.length;
  document.getElementById('stat-withdrawal').textContent = withdrawals.length;
  document.getElementById('stat-pending').textContent = pending.length;
  document.getElementById('stat-blocked').textContent = blockedList.length;
  document.getElementById('badge-deposit').textContent = deposits.filter(r => r.status === 'pending').length;
  document.getElementById('badge-withdrawal').textContent = withdrawals.filter(r => r.status === 'pending').length;
  document.getElementById('badge-blocked').textContent = blockedList.length;

  renderList('deposit-list', deposits);
  renderList('withdrawal-list', withdrawals);
  renderBlocked(blockedList);
}

function renderList(containerId, items) {
  const el = document.getElementById(containerId);
  if (!items.length) { el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>Заявок пока нет</p></div>`; return; }
  const sorted = [...items].sort((a, b) => {
    if (a.status === 'pending' && b.status !== 'pending') return -1;
    if (b.status === 'pending' && a.status !== 'pending') return 1;
    return b.time - a.time;
  });
  el.innerHTML = sorted.map(buildCard).join('');
}

function buildCard(req) {
  const isPending = req.status === 'pending';
  const isDeposit = req.type === 'deposit';
  const timeStr = new Date(req.time).toLocaleString('ru', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  const amount = isDeposit ? (req.fee || req.amount) : req.amount;
  const statusHtml = !isPending ? (req.status === 'approved' ? `<span class="status-badge status-approved">✅ Одобрено</span>` : `<span class="status-badge status-rejected">❌ Отклонено</span>`) : '';
  const photoHtml = req.photoUrl ? `<img src="${req.photoUrl}" class="receipt-photo" onclick="openLightbox('${req.photoUrl}')" alt="Чек" onerror="this.style.display='none'">` : '';
  const actionsHtml = isPending
    ? `<button class="btn btn-approve" onclick="doApprove('${req.id}')">✅ Одобрить</button><button class="btn btn-reject" onclick="doReject('${req.id}')">❌ Отклонить</button><button class="btn btn-block" onclick="doBlock('${req.id}')">🚫 Заблокировать</button>`
    : `<button class="btn btn-block" onclick="doBlock('${req.id}')">🚫 Заблокировать</button>`;

  return `
    <div class="request-card" id="card-${req.id}">
      <div class="card-header">
        <div class="card-header-left">
          <span class="card-type-badge ${isDeposit ? 'badge-deposit' : 'badge-withdrawal'}">${isDeposit ? '📥 Пополнение' : '📤 Вывод'}</span>
          <span class="card-id">#${req.id}</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px">${statusHtml}<span class="card-time">${timeStr}</span></div>
      </div>
      <div class="card-body">
        <div class="card-fields">
          <div class="field-item"><div class="field-label">Пользователь</div><div class="field-val">${req.username ? '@' + req.username : req.userId}</div></div>
          <div class="field-item"><div class="field-label">1xBET ID</div><div class="field-val">${req.betId}</div></div>
          <div class="field-item"><div class="field-label">Сумма</div><div class="field-val amount">${amount} KGS</div></div>
          ${isDeposit ? `<div class="field-item"><div class="field-label">Способ</div><div class="field-val">${req.method||'—'}</div></div><div class="field-item"><div class="field-label">Кошелёк</div><div class="field-val">${req.wallet||'—'}</div></div>` : `<div class="field-item"><div class="field-label">Город</div><div class="field-val">${req.city||'—'}</div></div>`}
        </div>
        ${photoHtml}
        <div class="card-actions">${actionsHtml}</div>
      </div>
    </div>`;
}

function renderBlocked(list) {
  const el = document.getElementById('blocked-list');
  if (!list.length) { el.innerHTML = `<div class="empty-state"><div class="empty-icon">✅</div><p>Заблокированных нет</p></div>`; return; }
  el.innerHTML = list.map(u => `
    <div class="blocked-card">
      <div class="blocked-info"><div class="blocked-avatar">🚫</div><div><div class="blocked-name">${u.username ? '@' + u.username : 'Пользователь'}</div><div class="blocked-id">ID: ${u.userId}</div></div></div>
      <button class="btn btn-unblock" onclick="doUnblock('${u.userId}')">🔓 Разблокировать</button>
    </div>`).join('');
}

// ── ДЕЙСТВИЯ ──
async function doApprove(reqId) {
  disableBtns(reqId);
  const req = requests[reqId];
  if (!req) return;
  req.status = 'approved';
  await saveData();
  const msg = req.type === 'deposit'
    ? `Средства успешно зачислены на ваш счет💸\n${req.betId} «Счет успешно пополнен✅»\n\n${req.fee || req.amount} KGS\n\nЖдем вас снова 🫶🏻`
    : `Средства успешно выведены на ваш кошелек💸\n${req.betId} «Вывод успешно выполнен✅»\n\n${req.amount} KGS\n\nЖдем вас снова 🫶🏻`;
  await sendTG(req.userId, msg);
  showToast('✅ Одобрено, уведомление отправлено', 'success');
  render();
}

async function doReject(reqId) {
  disableBtns(reqId);
  const req = requests[reqId];
  if (!req) return;
  req.status = 'rejected';
  await saveData();
  await sendTG(req.userId, `🚫 Пополнение отклонено\n❗ Зафиксированы несоответствия в данных. Рекомендуем соблюдать честность при операциях!`);
  showToast('❌ Отклонено, уведомление отправлено', 'error');
  render();
}

async function doBlock(reqId) {
  disableBtns(reqId);
  const req = requests[reqId];
  if (!req) return;
  blocked[req.userId] = { userId: req.userId, username: req.username, time: Date.now() };
  await saveData();
  await sendTG(req.userId, `🚫 Ваш аккаунт заблокирован.\n\nДля уточнения деталей обратитесь: @Xsomadmin`);
  showToast('🚫 Пользователь заблокирован', 'error');
  render();
}

async function doUnblock(userId) {
  delete blocked[userId];
  await saveData();
  showToast('🔓 Разблокирован', 'success');
  render();
}

function disableBtns(reqId) {
  const card = document.getElementById('card-' + reqId);
  if (card) card.querySelectorAll('.btn').forEach(b => b.disabled = true);
}

// ── TELEGRAM ──
async function sendTG(chatId, text) {
  try {
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId, text })
    });
  } catch (e) { console.error('TG error:', e); }
}

// ── LIGHTBOX ──
function openLightbox(url) { document.getElementById('lightbox-img').src = url; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ── TOAST ──
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
